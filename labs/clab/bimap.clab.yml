# Bimap stateful-firewall demo.
# Brings up two Linux hosts (client, server) and a Linux middlebox (firewall)
# running nftables, wired point-to-point so all bimap traffic crosses the
# middlebox.  The firewall uses stateful conntrack with a per-port allowlist:
# only tcp/{22,80,443,8080} is allowed client→server; server→client allows
# all TCP.  The control channel (tcp/4242) is exempted.
#
# Topology:
#
#   10.0.0.0/24                        10.0.1.0/24
#   client:eth1 ──── firewall:eth1      firewall:eth2 ──── server:eth1
#   10.0.0.2/24      10.0.0.1/24        10.0.1.1/24        10.0.1.2/24
#
# A bimap forward scan (client→server, ports 1-200) reveals that only
# tcp/22 and tcp/80 pass; every other port hits the policy drop.
#
# Implementation notes:
#   - debian:12-slim ships without `ip` and `nft`, so each container's first
#     exec lines install iproute2 (and nftables on the firewall).
#   - The nftables ruleset lives in firewall.nft (beside this file) and is
#     bind-mounted into the firewall container, then loaded with
#     `nft -f /etc/bimap/firewall.nft`.

name: bimap
prefix: ""                         # short container names: server, client, firewall

mgmt:
  network: clab-bimap-mgmt        # only for `docker exec`; datapath uses veth subnets
  ipv4-subnet: 172.20.21.0/24

topology:
  defaults:
    kind: linux

  nodes:
    server:
      image: debian:12-slim
      binds:
        - ../../target/release/bimap:/usr/local/bin/bimap:ro
      exec:
        - apt-get update
        - apt-get install -y iproute2
        - ip addr add 10.0.1.2/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 10.0.1.1

    client:
      image: debian:12-slim
      binds:
        - ../../target/release/bimap:/usr/local/bin/bimap:ro
      exec:
        - apt-get update
        - apt-get install -y iproute2
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 10.0.0.1

    firewall:
      image: debian:12-slim
      cap-add: [NET_ADMIN]
      sysctls:
        net.ipv4.ip_forward: 1
      binds:
        - ./firewall.nft:/etc/bimap/firewall.nft:ro
      exec:
        - apt-get update
        - apt-get install -y iproute2 nftables
        - ip addr add 10.0.0.1/24 dev eth1
        - ip addr add 10.0.1.1/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - nft -f /etc/bimap/firewall.nft

  links:
    - endpoints: ["client:eth1",   "firewall:eth1"]
    - endpoints: ["firewall:eth2",  "server:eth1"]